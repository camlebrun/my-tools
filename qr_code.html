<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Code - QuickTools</title>
    <meta name="description" content="Générateur QR codes simple avec options de personnalisation. Interface moderne et résultats de qualité.">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html" aria-label="QuickTools - Accueil">
                <span class="brand-icon">⚡</span>
                QuickTools
            </a>
            
            <div class="nav-menu" id="navMenu">
                <ul class="nav-list">
                    <li><a class="nav-link active" href="qr_code.html">QR Code</a></li>
                    <li><a class="nav-link" href="cal_days.html">Dates</a></li>
                    <li><a class="nav-link" href="pwd.html">Sécurité</a></li>
                    <li><a class="nav-link" href="kitchen.html">Cuisine</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">
                    QR <span class="highlight">Code</span>
                </h1>
                <p class="hero-subtitle">
                    Générateur instantané haute fidélité.
                </p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="tools-section">
        <div class="container">
            <div class="qr-generator-container">
                <!-- Input Section -->
                <div class="qr-input-section">
                    <h2 class="section-title">Configuration</h2>
                    <p class="section-subtitle">
                        URL ou texte à encoder
                    </p>
                    
                    <div class="input-group">
                        <input 
                            id="qr-text" 
                            class="form-control" 
                            type="text" 
                            placeholder="https://..." 
                            aria-label="URL ou texte pour QR Code"
                        >
                    </div>
                    
                    <div class="qr-options">
                        <div class="option-group">
                            <label for="qr-size">Format :</label>
                            <select id="qr-size" class="form-control">
                                <option value="128">Petit (128px)</option>
                                <option value="256" selected>Standard (256px)</option>
                                <option value="512">Grand (512px)</option>
                            </select>
                        </div>
                        
                        <div class="option-group">
                            <label for="qr-foreground">Couleur :</label>
                            <input 
                                type="color" 
                                id="qr-foreground" 
                                value="#000000" 
                                class="form-control color-picker"
                            >
                        </div>
                        
                        <button 
                            id="generate-btn" 
                            class="btn btn-primary" 
                            style="margin-top: 1rem; width: 100%;"
                        >
                            Générer le QR Code
                        </button>
                    </div>
                </div>
                
                <!-- Result Section -->
                <div class="qr-result-section">
                    <div id="qrcode" class="qr-display" aria-live="polite">
                        <div class="qr-placeholder">
                            <div class="placeholder-icon">📱</div>
                            <p>Prêt pour la génération</p>
                        </div>
                    </div>
                    
                    <div class="qr-actions" style="display: none;">
                        <button id="download-btn" class="btn btn-primary">
                            Télécharger (PNG)
                        </button>
                        <button id="copy-btn" class="btn btn-outline">
                            Copier
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3 class="footer-title">QuickTools</h3>
                    <p class="footer-description">
                        L'efficacité par le design.
                    </p>
                </div>
                
                <div class="footer-links">
                    <div class="footer-section">
                        <h4>Navigation</h4>
                        <ul>
                            <li><a href="qr_code.html">QR Code</a></li>
                            <li><a href="cal_days.html">Dates</a></li>
                            <li><a href="pwd.html">Sécurité</a></li>
                            <li><a href="kitchen.html">Cuisine</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <div class="footer-bottom">
                <p>&copy; QuickTools. </p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script src="js/qr-generator.js"></script>
</body>
</html>
